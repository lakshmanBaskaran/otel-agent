
services:
  - type: web
    name: otel-rm-agent
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: BASIC_AUTH_USER
        sync: false
      - key: BASIC_AUTH_PASS
        sync: false
      - key: CHAINLIT_AUTH_SECRET
        sync: false
      - key: PORT
        value: 8000
